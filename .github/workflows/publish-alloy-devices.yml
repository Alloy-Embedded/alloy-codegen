name: Publish alloy-devices

on:
  workflow_run:
    workflows: ["Bootstrap Family CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      ref:
        description: "alloy-codegen ref to publish"
        required: false
        default: "main"
        type: string
      push_changes:
        description: "Push changed published artifacts to alloy-devices/main"
        required: false
        default: false
        type: boolean
      force_all:
        description: "Bypass affected-families detection; run the full matrix"
        required: false
        default: false
        type: boolean

jobs:
  detect-affected:
    name: Detect affected families
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
      should_publish: ${{ steps.detect.outputs.should_publish }}
      all_families: ${{ steps.detect.outputs.all_families }}
    steps:
      - name: Checkout alloy-codegen (workflow run)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2
          submodules: true

      - name: Checkout alloy-codegen (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 2
          submodules: true

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Resolve since ref
        id: since
        run: |
          set -eu
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            since="${{ inputs.ref }}~1"
          else
            since="${{ github.event.workflow_run.head_sha }}~1"
          fi
          # Fall back to HEAD~1 if the parent isn't reachable in the shallow checkout.
          if ! git rev-parse --verify "$since" >/dev/null 2>&1; then
            since="HEAD~1"
          fi
          echo "since=$since" >> "$GITHUB_OUTPUT"

      - name: Compute affected families
        id: detect
        env:
          FORCE_ALL: ${{ inputs.force_all }}
          SINCE_REF: ${{ steps.since.outputs.since }}
        run: |
          set -eu
          mkdir -p out
          force_flag=""
          if [ "${FORCE_ALL:-false}" = "true" ]; then
            force_flag="--force-all"
          fi
          python -m alloy_codegen.cli affected-families \
            --since "$SINCE_REF" \
            --json $force_flag \
            > out/affected.json
          cat out/affected.json
          python - <<'PY'
          import json
          import os
          payload = json.loads(open("out/affected.json").read())
          matrix = payload["matrix"]
          should_publish = "true" if payload["should_publish"] else "false"
          all_families = "true" if payload["all_families"] else "false"
          out_path = os.environ["GITHUB_OUTPUT"]
          with open(out_path, "a") as fh:
              fh.write(f"matrix={json.dumps(matrix)}\n")
              fh.write(f"should_publish={should_publish}\n")
              fh.write(f"all_families={all_families}\n")
          PY

      - name: Summarize affected families
        run: |
          {
            echo "## Affected families"
            echo ""
            echo "- since: \`${{ steps.since.outputs.since }}\`"
            echo "- should_publish: \`${{ steps.detect.outputs.should_publish }}\`"
            echo "- all_families: \`${{ steps.detect.outputs.all_families }}\`"
            echo ""
            echo "Matrix (JSON):"
            echo ""
            echo '```json'
            echo '${{ steps.detect.outputs.matrix }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  publish:
    name: Publish ${{ matrix.vendor }}/${{ matrix.family }} to alloy-devices
    needs: detect-affected
    if: needs.detect-affected.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJson(needs.detect-affected.outputs.matrix) }}
    env:
      ALLOY_DEVICES_REPOSITORY: ${{ github.repository_owner }}/alloy-devices

    steps:
      - name: Checkout alloy-codegen (workflow run)
        if: github.event_name == 'workflow_run'
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: true

      - name: Checkout alloy-codegen (manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: true

      - name: Resolve publication settings
        id: settings
        env:
          INPUT_PUSH_CHANGES: ${{ inputs.push_changes }}
          HAS_PUSH_TOKEN: ${{ secrets.ALLOY_DEVICES_PUSH_TOKEN != '' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -eu
          vendor="${{ matrix.vendor }}"
          family="${{ matrix.family }}"

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            requested_push="${INPUT_PUSH_CHANGES:-false}"
          else
            requested_push="true"
          fi

          effective_push="$requested_push"
          if [ "$requested_push" = "true" ] && [ "$HAS_PUSH_TOKEN" != "true" ]; then
            effective_push="false"
          fi

          source_revision="$(git rev-parse HEAD)"
          {
            echo "vendor=$vendor"
            echo "family=$family"
            echo "requested_push=$requested_push"
            echo "effective_push=$effective_push"
            echo "has_push_token=$HAS_PUSH_TOKEN"
            echo "source_revision=$source_revision"
          } >> "$GITHUB_OUTPUT"

      - name: Checkout Alloy consumer
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/alloy
          path: alloy

      - name: Checkout alloy-devices
        uses: actions/checkout@v6
        with:
          repository: ${{ env.ALLOY_DEVICES_REPOSITORY }}
          path: alloy-devices
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Publish validated artifacts into alloy-devices checkout
        run: |
          set -o pipefail
          mkdir -p out/release
          artifact_root="$RUNNER_TEMP/alloy-devices-release-artifacts"
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          git -C "$publication_root" reset --hard HEAD
          git -C "$publication_root" clean -fdx
          rm -rf "$artifact_root"
          python -m alloy_codegen.cli publish \
            --vendor "${{ steps.settings.outputs.vendor }}" \
            --family "${{ steps.settings.outputs.family }}" \
            --artifact-root "$artifact_root" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee out/release/publish.json

      - name: Assert published family is contract-complete
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          from alloy_codegen.bootstrap import registered_device_names

          vendor = "${{ steps.settings.outputs.vendor }}"
          family = "${{ steps.settings.outputs.family }}"
          family_root = Path("alloy-devices") / vendor / family

          coverage = json.loads((family_root / "reports" / "coverage.json").read_text())
          summary = json.loads((family_root / "reports" / "validation-summary.json").read_text())
          provenance = json.loads((family_root / "reports" / "runtime-provenance.json").read_text())
          explainability = json.loads(
              (family_root / "reports" / "runtime-explainability.json").read_text()
          )

          assert coverage["vendor"] == vendor, coverage
          assert coverage["family"] == family, coverage
          assert coverage["all_devices_publishable"] is True, coverage
          assert all(bool(device["publishable"]) for device in coverage["devices"]), coverage
          assert summary["draft_system_descriptor_domains"] == [], summary
          assert provenance["report_id"] == "runtime-provenance-v1", provenance
          assert explainability["report_id"] == "runtime-explainability-v1", explainability

          expected_devices = registered_device_names(vendor, family)
          assert {device["device"] for device in coverage["devices"]} == set(expected_devices)
          assert {device["device"] for device in provenance["devices"]} == set(expected_devices)
          assert {device["device"] for device in explainability["devices"]} == set(expected_devices)

          provenance_by_device = {device["device"]: device for device in provenance["devices"]}
          explainability_by_device = {
              device["device"]: device for device in explainability["devices"]
          }

          for device in expected_devices:
              provenance_device = provenance_by_device[device]
              explainability_device = explainability_by_device[device]
              assert provenance_device["fact_count"] > 0, provenance_device
              assert all(
                  fact["provenance"]["source_ids"] for fact in provenance_device["facts"]
              ), provenance_device
              assert all(
                  fact["inference_rule"]
                  for fact in provenance_device["facts"]
                  if fact["derivation_kind"] == "inferred"
              ), provenance_device
              assert explainability_device["unsupported_runtime_peripherals"] == [], (
                  explainability_device
              )
              for relative_path in (
                  "generated/runtime/types.hpp",
                  f"generated/runtime/devices/{device}/pins.hpp",
                  f"generated/runtime/devices/{device}/peripheral_instances.hpp",
                  f"generated/runtime/devices/{device}/register_fields.hpp",
                  f"generated/runtime/devices/{device}/registers.hpp",
                  f"generated/runtime/devices/{device}/startup.hpp",
                  f"generated/runtime/devices/{device}/interrupts.hpp",
                  f"generated/runtime/devices/{device}/resets.hpp",
                  f"generated/runtime/devices/{device}/enable_domains.hpp",
                  f"generated/runtime/devices/{device}/clock_graph.hpp",
                  f"generated/runtime/devices/{device}/capabilities.hpp",
                  f"generated/runtime/devices/{device}/system_sequences.hpp",
                  f"generated/devices/{device}/startup_vectors.cpp",
              ):
                  assert (family_root / relative_path).exists(), relative_path
          PY

      - name: Derive release commit metadata
        id: release
        run: |
          python -m alloy_codegen.release \
            --publish-report out/release/publish.json \
            --source-revision "${{ steps.settings.outputs.source_revision }}" \
            --github-output "$GITHUB_OUTPUT" \
            --json > out/release/release-metadata.json

      - name: Detect publication diff
        id: diff
        run: |
          set -eu
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          status="$(git -C "$publication_root" status --porcelain --untracked-files=all)"
          printf '%s\n' "$status" > out/release/git-status.txt
          if [ -n "$status" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git -C "$publication_root" diff --stat > out/release/git-diff-stat.txt
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            : > out/release/git-diff-stat.txt
          fi

      - name: Commit published artifacts
        if: steps.diff.outputs.has_changes == 'true' && steps.settings.outputs.effective_push == 'true'
        run: |
          set -eu
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          git -C "$publication_root" config user.name "alloy-codegen[bot]"
          git -C "$publication_root" config user.email "alloy-codegen[bot]@users.noreply.github.com"
          git -C "$publication_root" add .
          git -C "$publication_root" commit \
            -m "${{ steps.release.outputs.commit_subject }}" \
            -m "${{ steps.release.outputs.commit_body }}"

      - name: Push published artifacts
        if: steps.diff.outputs.has_changes == 'true' && steps.settings.outputs.effective_push == 'true'
        env:
          ALLOY_DEVICES_PUSH_TOKEN: ${{ secrets.ALLOY_DEVICES_PUSH_TOKEN }}
        run: |
          set -eu
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          git -C "$publication_root" config --local --unset-all http.https://github.com/.extraheader || true
          git -C "$publication_root" remote set-url origin \
            "https://x-access-token:${ALLOY_DEVICES_PUSH_TOKEN}@github.com/${ALLOY_DEVICES_REPOSITORY}.git"
          # Per-family publish jobs run in parallel and race on alloy-devices
          # main. Retry with fetch + rebase on rejection so concurrent writers
          # serialize cleanly. Each family touches disjoint paths
          # (vendor/family/...), so the rebase is conflict-free in practice.
          attempts=0
          max_attempts=5
          while true; do
            if git -C "$publication_root" push origin HEAD:main; then
              break
            fi
            attempts=$((attempts + 1))
            if [ "$attempts" -ge "$max_attempts" ]; then
              echo "push to alloy-devices failed after $attempts attempts" >&2
              exit 1
            fi
            sleep_for=$((RANDOM % 5 + 2))
            echo "push rejected; fetch + rebase + retry in ${sleep_for}s (attempt $attempts/$max_attempts)" >&2
            sleep "$sleep_for"
            git -C "$publication_root" fetch origin main
            git -C "$publication_root" rebase origin/main
          done

      - name: Summarize remote publication outcome
        if: always()
        run: |
          {
            echo "vendor=${{ steps.settings.outputs.vendor }}"
            echo "family=${{ steps.settings.outputs.family }}"
            echo "source_revision=${{ steps.settings.outputs.source_revision }}"
            echo "requested_push=${{ steps.settings.outputs.requested_push }}"
            echo "effective_push=${{ steps.settings.outputs.effective_push }}"
            echo "has_push_token=${{ steps.settings.outputs.has_push_token }}"
            echo "has_changes=${{ steps.diff.outputs.has_changes }}"
            echo "commit_subject=${{ steps.release.outputs.commit_subject }}"
          } > out/release/publication-env.txt
          {
            echo "## alloy-devices publication"
            echo ""
            echo "- Vendor: \`${{ steps.settings.outputs.vendor }}\`"
            echo "- Family: \`${{ steps.settings.outputs.family }}\`"
            echo "- Source revision: \`${{ steps.settings.outputs.source_revision }}\`"
            echo "- Requested push: \`${{ steps.settings.outputs.requested_push }}\`"
            echo "- Effective push: \`${{ steps.settings.outputs.effective_push }}\`"
            echo "- Has push token: \`${{ steps.settings.outputs.has_push_token }}\`"
            echo "- Working tree changed: \`${{ steps.diff.outputs.has_changes }}\`"
            echo "- Commit subject: \`${{ steps.release.outputs.commit_subject }}\`"
            if [ "${{ steps.settings.outputs.requested_push }}" = "true" ] && [ "${{ steps.settings.outputs.has_push_token }}" != "true" ]; then
              echo ""
              echo "Automatic push is configured but skipped because \`ALLOY_DEVICES_PUSH_TOKEN\` is not set."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload publication artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: publish-alloy-devices-${{ steps.settings.outputs.vendor }}-${{ steps.settings.outputs.family }}
          path: out/release/
