name: Bootstrap Family CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "patches/**"
      - "schemas/**"
      - "tests/**"
      - "docs/**"
      - "pyproject.toml"
      - "README.md"
      - "openspec/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "patches/**"
      - "schemas/**"
      - "tests/**"
      - "docs/**"
      - "pyproject.toml"
      - "README.md"
      - "openspec/**"
      - ".github/workflows/**"

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    env:
      ALLOY_CODEGEN_ALLOY_ROOT: ${{ github.workspace }}/alloy

    steps:
      - name: Checkout alloy-codegen
        uses: actions/checkout@v6

      - name: Checkout Alloy consumer
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/alloy
          path: alloy

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Ruff
        run: python -m ruff check src tests

      - name: Pytest
        run: python -m pytest tests

      - name: Ruff format
        run: python -m ruff format --check src tests

      - name: Vendor admission gate
        run: |
          # Vendor 4 admission is blocked until all foundational families pass gates T7, T8, T9.
          # Only st, microchip, and nxp are currently admitted. Any other vendor directory in
          # patches/ means vendor-4 work has started without a completed admission spec.
          ADMITTED_VENDORS="st microchip nxp"
          UNKNOWN=()
          for vendor_dir in patches/*/; do
            vendor="$(basename "$vendor_dir")"
            admitted=false
            for admitted_vendor in $ADMITTED_VENDORS; do
              if [ "$vendor" = "$admitted_vendor" ]; then
                admitted=true
                break
              fi
            done
            if [ "$admitted" = "false" ]; then
              UNKNOWN+=("$vendor")
            fi
          done
          if [ ${#UNKNOWN[@]} -gt 0 ]; then
            echo "ERROR: Unadmitted vendor(s) detected in patches/: ${UNKNOWN[*]}"
            echo "Vendor 4 admission requires gates T7 (st/stm32f4), T8 (microchip/same70), and"
            echo "T9 (nxp/imxrt1060) to be provably closed and a completed vendor-admission proposal"
            echo "to exist in openspec/changes/ before any new vendor directory may be added."
            exit 1
          fi
          echo "Vendor admission gate passed. Admitted vendors: $ADMITTED_VENDORS"

  bootstrap-family:
    name: Bootstrap Family (${{ matrix.device }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: stm32g030f6
            sources: >-
              --source cmsis-svd-data=tests/fixtures/cmsis-svd-data
              --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data
          - device: stm32g071rb
            sources: >-
              --source cmsis-svd-data=tests/fixtures/cmsis-svd-data
              --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data
          - device: stm32g0b1re
            sources: >-
              --source cmsis-svd-data=tests/fixtures/cmsis-svd-data
              --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data
          - device: stm32f401re
            sources: >-
              --source cmsis-svd-data=tests/fixtures/cmsis-svd-data
              --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data
          - device: stm32f405rg
            sources: >-
              --source cmsis-svd-data=tests/fixtures/cmsis-svd-data
              --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data
          - device: atsame70n21b
            sources: >-
              --source microchip-dfp-extract=tests/fixtures/microchip-dfp-same70
          - device: atsame70q21b
            sources: >-
              --source microchip-dfp-extract=tests/fixtures/microchip-dfp-same70
          - device: mimxrt1062
            sources: >-
              --source nxp-mcux-soc-svd=tests/fixtures/nxp-mcux-imxrt1060/svd
              --source nxp-mcux-sdk=tests/fixtures/nxp-mcux-imxrt1060/sdk
          - device: mimxrt1064
            sources: >-
              --source nxp-mcux-soc-svd=tests/fixtures/nxp-mcux-imxrt1060/svd
              --source nxp-mcux-sdk=tests/fixtures/nxp-mcux-imxrt1060/sdk

    steps:
      - name: Checkout alloy-codegen
        uses: actions/checkout@v6

      - name: Checkout Alloy consumer
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/alloy
          path: alloy

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate machine-readable report
        run: |
          set -o pipefail
          mkdir -p out/validation
          report_path="out/validation/${{ matrix.device }}.json"
          set +e
          python -m alloy_codegen.cli validate \
            --device "${{ matrix.device }}" \
            ${{ matrix.sources }} \
            --artifact-root "$RUNNER_TEMP/artifacts/${{ matrix.device }}" \
            --publication-root "$RUNNER_TEMP/publication/${{ matrix.device }}" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$report_path"
          validate_status=${PIPESTATUS[0]}
          set -e
          python - "$report_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          assert payload["stage"] == "validate", payload
          assert payload["scope"]["device"], payload
          report = payload["payload"]["report"]
          assert report["report_id"] == "bootstrap-validation-v1", payload
          assert report["is_passing"] is True, payload
          assert any(
              gate["gate_id"] == "gate-c" and gate["passed"] for gate in report["gates"]
          ), payload
          PY
          test "$validate_status" -eq 0

      - name: Publish bootstrap artifact cycle 1
        run: |
          set -o pipefail
          mkdir -p out/publish
          publish_path="out/publish/${{ matrix.device }}-cycle1.json"
          publication_root="$RUNNER_TEMP/publication/${{ matrix.device }}"
          python -m alloy_codegen.cli publish \
            --device "${{ matrix.device }}" \
            ${{ matrix.sources }} \
            --artifact-root "$RUNNER_TEMP/artifacts/${{ matrix.device }}" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path"
          python - "$publish_path" "$publication_root" "${{ matrix.device }}" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          publication_root = Path(sys.argv[2])
          device = sys.argv[3]
          assert payload["stage"] == "publish", payload
          assert payload["status"] == "completed", payload
          plan = payload["payload"]
          assert plan["publication_mode"] == "published", payload
          assert plan["target_artifact_revision"], payload
          assert plan["consumer_verification"]["succeeded"] is True, payload

          scope = payload["scope"]
          vendor = scope["vendor"]
          family = scope["family"]
          family_root = publication_root / vendor / family
          provenance = json.loads((family_root / "reports" / "runtime-provenance.json").read_text())
          explainability = json.loads(
              (family_root / "reports" / "runtime-explainability.json").read_text()
          )

          assert provenance["report_id"] == "runtime-provenance-v1", provenance
          assert explainability["report_id"] == "runtime-explainability-v1", explainability

          provenance_device = next(item for item in provenance["devices"] if item["device"] == device)
          explainability_device = next(
              item for item in explainability["devices"] if item["device"] == device
          )
          assert provenance_device["fact_count"] > 0, provenance_device
          assert explainability_device["unsupported_runtime_peripherals"] == [], explainability_device
          assert explainability_device["route_decision_count"] >= 0, explainability_device

          for relative_path in (
              f"generated/runtime/devices/{device}/interrupts.hpp",
              f"generated/runtime/devices/{device}/resets.hpp",
              f"generated/runtime/devices/{device}/enable_domains.hpp",
              f"generated/runtime/devices/{device}/clock_graph.hpp",
              f"generated/runtime/devices/{device}/capabilities.hpp",
              f"generated/runtime/devices/{device}/system_sequences.hpp",
          ):
              assert (family_root / relative_path).exists(), relative_path
          PY

      - name: Publish bootstrap artifact cycle 2 and verify determinism
        run: |
          set -o pipefail
          publish_path_a="out/publish/${{ matrix.device }}-cycle1.json"
          publish_path_b="out/publish/${{ matrix.device }}-cycle2.json"
          publication_root="$RUNNER_TEMP/publication/${{ matrix.device }}"
          artifact_root="$RUNNER_TEMP/artifacts/${{ matrix.device }}"
          tree_revision_a=$(PYTHONPATH=src python - "$publication_root" <<'PY'
          import sys
          from pathlib import Path
          from alloy_codegen.publication import compute_materialized_tree_revision

          root = Path(sys.argv[1])
          print(compute_materialized_tree_revision(root))
          PY
          )
          rm -rf "$artifact_root" "$publication_root"
          python -m alloy_codegen.cli publish \
            --device "${{ matrix.device }}" \
            ${{ matrix.sources }} \
            --artifact-root "$artifact_root" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path_b"
          tree_revision_b=$(PYTHONPATH=src python - "$publication_root" <<'PY'
          import sys
          from pathlib import Path
          from alloy_codegen.publication import compute_materialized_tree_revision

          root = Path(sys.argv[1])
          print(compute_materialized_tree_revision(root))
          PY
          )
          python - "$publish_path_a" "$publish_path_b" "$tree_revision_a" "$tree_revision_b" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload_a = json.loads(Path(sys.argv[1]).read_text())
          payload_b = json.loads(Path(sys.argv[2]).read_text())
          tree_revision_a = sys.argv[3]
          tree_revision_b = sys.argv[4]

          plan_a = payload_a["payload"]
          plan_b = payload_b["payload"]

          assert payload_b["stage"] == "publish", payload_b
          assert payload_b["status"] == "completed", payload_b
          assert plan_b["publication_mode"] == "published", payload_b
          assert plan_b["consumer_verification"]["succeeded"] is True, payload_b
          assert plan_a["target_artifact_revision"] == plan_b["target_artifact_revision"]
          assert plan_a["publication_record"]["content_sha256"] == plan_b["publication_record"]["content_sha256"]
          assert plan_a["publication_summary"]["content_sha256"] == plan_b["publication_summary"]["content_sha256"]
          assert tree_revision_a == tree_revision_b
          assert [artifact["content_sha256"] for artifact in plan_a["published_artifacts"]] == [
              artifact["content_sha256"] for artifact in plan_b["published_artifacts"]
          ]
          PY

      - name: Upload validation and publication reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-family-${{ matrix.device }}
          path: out/

  alloy-devices-integration:
    name: alloy-devices Integration
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout alloy-codegen
        uses: actions/checkout@v6

      - name: Checkout Alloy consumer
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/alloy
          path: alloy

      - name: Checkout alloy-devices
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/alloy-devices
          path: alloy-devices

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Publish bootstrap family to real alloy-devices checkout cycle 1
        run: |
          set -o pipefail
          mkdir -p out/alloy-devices
          artifact_root="$RUNNER_TEMP/alloy-devices-artifacts"
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          publish_path="out/alloy-devices/stm32g0-cycle1.json"
          git -C "$publication_root" reset --hard HEAD
          git -C "$publication_root" clean -fdx
          rm -rf "$artifact_root"
          python -m alloy_codegen.cli publish \
            --family stm32g0 \
            --source cmsis-svd-data=tests/fixtures/cmsis-svd-data \
            --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data \
            --artifact-root "$artifact_root" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path"
          tree_revision_a=$(PYTHONPATH=src python - "$publication_root" <<'PY'
          import sys
          from pathlib import Path
          from alloy_codegen.publication import compute_materialized_tree_revision

          print(compute_materialized_tree_revision(Path(sys.argv[1])))
          PY
          )
          printf '%s' "$tree_revision_a" > out/alloy-devices/tree-cycle1.txt
          python - "$publish_path" "$publication_root" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          publication_root = Path(sys.argv[2])
          plan = payload["payload"]

          assert payload["stage"] == "publish", payload
          assert payload["status"] == "completed", payload
          assert plan["publication_mode"] == "published", payload
          assert plan["consumer_verification"]["succeeded"] is True, payload
          assert (publication_root / "st" / "stm32g0" / "generated" / "runtime" / "types.hpp").exists()
          assert (publication_root / "st" / "stm32g0" / "generated" / "runtime" / "devices" / "stm32g030f6" / "registers.hpp").exists()
          assert (publication_root / "st" / "stm32g0" / "generated" / "runtime" / "devices" / "stm32g071rb" / "registers.hpp").exists()
          assert (publication_root / "st" / "stm32g0" / "generated" / "runtime" / "devices" / "stm32g0b1re" / "registers.hpp").exists()
          assert (publication_root / "st" / "stm32g0" / "metadata" / "family-index.json").exists()
          assert (publication_root / "st" / "stm32g0" / "artifact-manifest.json").exists()
          PY
          git -C "$publication_root" status --short > out/alloy-devices/git-status-cycle1.txt

      - name: Publish bootstrap family to real alloy-devices checkout cycle 2
        run: |
          set -o pipefail
          artifact_root="$RUNNER_TEMP/alloy-devices-artifacts"
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          publish_path_a="out/alloy-devices/stm32g0-cycle1.json"
          publish_path_b="out/alloy-devices/stm32g0-cycle2.json"
          tree_revision_a=$(cat out/alloy-devices/tree-cycle1.txt)
          git -C "$publication_root" reset --hard HEAD
          git -C "$publication_root" clean -fdx
          rm -rf "$artifact_root"
          python -m alloy_codegen.cli publish \
            --family stm32g0 \
            --source cmsis-svd-data=tests/fixtures/cmsis-svd-data \
            --source stm32-open-pin-data=tests/fixtures/stm32-open-pin-data \
            --artifact-root "$artifact_root" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path_b"
          tree_revision_b=$(PYTHONPATH=src python - "$publication_root" <<'PY'
          import sys
          from pathlib import Path
          from alloy_codegen.publication import compute_materialized_tree_revision

          print(compute_materialized_tree_revision(Path(sys.argv[1])))
          PY
          )
          printf '%s' "$tree_revision_b" > out/alloy-devices/tree-cycle2.txt
          git -C "$publication_root" status --short > out/alloy-devices/git-status-cycle2.txt
          python - "$publish_path_a" "$publish_path_b" "$tree_revision_a" "$tree_revision_b" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload_a = json.loads(Path(sys.argv[1]).read_text())
          payload_b = json.loads(Path(sys.argv[2]).read_text())
          tree_revision_a = sys.argv[3]
          tree_revision_b = sys.argv[4]
          plan_a = payload_a["payload"]
          plan_b = payload_b["payload"]

          assert payload_b["stage"] == "publish", payload_b
          assert payload_b["status"] == "completed", payload_b
          assert plan_b["publication_mode"] == "published", payload_b
          assert plan_b["consumer_verification"]["succeeded"] is True, payload_b
          published_sha_a = [artifact["content_sha256"] for artifact in plan_a["published_artifacts"]]
          published_sha_b = [artifact["content_sha256"] for artifact in plan_b["published_artifacts"]]
          mismatch_report = {
              "target_artifact_revision": [
                  plan_a["target_artifact_revision"],
                  plan_b["target_artifact_revision"],
              ],
              "publication_record": [
                  plan_a["publication_record"]["content_sha256"],
                  plan_b["publication_record"]["content_sha256"],
              ],
              "publication_summary": [
                  plan_a["publication_summary"]["content_sha256"],
                  plan_b["publication_summary"]["content_sha256"],
              ],
              "published_artifacts": [published_sha_a, published_sha_b],
              "tree_revision": [tree_revision_a, tree_revision_b],
          }
          assert (
              plan_a["target_artifact_revision"] == plan_b["target_artifact_revision"]
          ), mismatch_report
          assert (
              plan_a["publication_record"]["content_sha256"]
              == plan_b["publication_record"]["content_sha256"]
          ), mismatch_report
          assert (
              plan_a["publication_summary"]["content_sha256"]
              == plan_b["publication_summary"]["content_sha256"]
          ), mismatch_report
          assert published_sha_a == published_sha_b, mismatch_report
          assert tree_revision_a == tree_revision_b, mismatch_report
          PY

      - name: Publish NXP imxrt1060 family to real alloy-devices checkout cycle 1
        run: |
          set -o pipefail
          mkdir -p out/alloy-devices
          artifact_root="$RUNNER_TEMP/alloy-devices-artifacts"
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          publish_path="out/alloy-devices/imxrt1060-cycle1.json"
          git -C "$publication_root" reset --hard HEAD
          git -C "$publication_root" clean -fdx
          rm -rf "$artifact_root"
          python -m alloy_codegen.cli publish \
            --vendor nxp \
            --family imxrt1060 \
            --source nxp-mcux-soc-svd=tests/fixtures/nxp-mcux-imxrt1060/svd \
            --source nxp-mcux-sdk=tests/fixtures/nxp-mcux-imxrt1060/sdk \
            --artifact-root "$artifact_root" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path"
          tree_revision_a=$(PYTHONPATH=src python - "$publication_root" <<'PY'
          import sys
          from pathlib import Path
          from alloy_codegen.publication import compute_materialized_tree_revision

          print(compute_materialized_tree_revision(Path(sys.argv[1])))
          PY
          )
          printf '%s' "$tree_revision_a" > out/alloy-devices/imxrt1060-tree-cycle1.txt
          python - "$publish_path" "$publication_root" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          publication_root = Path(sys.argv[2])
          plan = payload["payload"]

          assert payload["stage"] == "publish", payload
          assert payload["status"] == "completed", payload
          assert plan["publication_mode"] == "published", payload
          assert plan["consumer_verification"]["succeeded"] is True, payload
          assert (publication_root / "nxp" / "imxrt1060" / "generated" / "runtime" / "types.hpp").exists()
          assert (publication_root / "nxp" / "imxrt1060" / "generated" / "runtime" / "devices" / "mimxrt1062" / "registers.hpp").exists()
          assert (publication_root / "nxp" / "imxrt1060" / "generated" / "runtime" / "devices" / "mimxrt1064" / "registers.hpp").exists()
          assert (publication_root / "nxp" / "imxrt1060" / "metadata" / "family-index.json").exists()
          assert (publication_root / "nxp" / "imxrt1060" / "artifact-manifest.json").exists()
          PY
          git -C "$publication_root" status --short > out/alloy-devices/imxrt1060-git-status-cycle1.txt

      - name: Publish NXP imxrt1060 family to real alloy-devices checkout cycle 2
        run: |
          set -o pipefail
          artifact_root="$RUNNER_TEMP/alloy-devices-artifacts"
          publication_root="$GITHUB_WORKSPACE/alloy-devices"
          publish_path_a="out/alloy-devices/imxrt1060-cycle1.json"
          publish_path_b="out/alloy-devices/imxrt1060-cycle2.json"
          tree_revision_a=$(cat out/alloy-devices/imxrt1060-tree-cycle1.txt)
          git -C "$publication_root" reset --hard HEAD
          git -C "$publication_root" clean -fdx
          rm -rf "$artifact_root"
          python -m alloy_codegen.cli publish \
            --vendor nxp \
            --family imxrt1060 \
            --source nxp-mcux-soc-svd=tests/fixtures/nxp-mcux-imxrt1060/svd \
            --source nxp-mcux-sdk=tests/fixtures/nxp-mcux-imxrt1060/sdk \
            --artifact-root "$artifact_root" \
            --publication-root "$publication_root" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path_b"
          tree_revision_b=$(PYTHONPATH=src python - "$publication_root" <<'PY'
          import sys
          from pathlib import Path
          from alloy_codegen.publication import compute_materialized_tree_revision

          print(compute_materialized_tree_revision(Path(sys.argv[1])))
          PY
          )
          printf '%s' "$tree_revision_b" > out/alloy-devices/imxrt1060-tree-cycle2.txt
          git -C "$publication_root" status --short > out/alloy-devices/imxrt1060-git-status-cycle2.txt
          python - "$publish_path_a" "$publish_path_b" "$tree_revision_a" "$tree_revision_b" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload_a = json.loads(Path(sys.argv[1]).read_text())
          payload_b = json.loads(Path(sys.argv[2]).read_text())
          tree_revision_a = sys.argv[3]
          tree_revision_b = sys.argv[4]
          plan_a = payload_a["payload"]
          plan_b = payload_b["payload"]

          assert payload_b["stage"] == "publish", payload_b
          assert payload_b["status"] == "completed", payload_b
          assert plan_b["publication_mode"] == "published", payload_b
          assert plan_b["consumer_verification"]["succeeded"] is True, payload_b
          published_sha_a = [artifact["content_sha256"] for artifact in plan_a["published_artifacts"]]
          published_sha_b = [artifact["content_sha256"] for artifact in plan_b["published_artifacts"]]
          mismatch_report = {
              "target_artifact_revision": [
                  plan_a["target_artifact_revision"],
                  plan_b["target_artifact_revision"],
              ],
              "publication_record": [
                  plan_a["publication_record"]["content_sha256"],
                  plan_b["publication_record"]["content_sha256"],
              ],
              "publication_summary": [
                  plan_a["publication_summary"]["content_sha256"],
                  plan_b["publication_summary"]["content_sha256"],
              ],
              "published_artifacts": [published_sha_a, published_sha_b],
              "tree_revision": [tree_revision_a, tree_revision_b],
          }
