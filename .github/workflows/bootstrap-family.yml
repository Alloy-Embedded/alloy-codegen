name: Bootstrap Family CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "patches/**"
      - "schemas/**"
      - "tests/**"
      - "docs/**"
      - "pyproject.toml"
      - "README.md"
      - "openspec/**"
      - ".github/workflows/bootstrap-family.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "patches/**"
      - "schemas/**"
      - "tests/**"
      - "docs/**"
      - "pyproject.toml"
      - "README.md"
      - "openspec/**"
      - ".github/workflows/bootstrap-family.yml"

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    env:
      ALLOY_CODEGEN_ALLOY_ROOT: ${{ github.workspace }}/alloy

    steps:
      - name: Checkout alloy-codegen
        uses: actions/checkout@v4

      - name: Checkout Alloy consumer
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/alloy
          path: alloy

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest ruff

      - name: Install OpenSpec CLI
        run: npm install --global @fission-ai/openspec

      - name: Ruff
        run: python -m ruff check src tests

      - name: Pytest
        run: python -m pytest tests

      - name: Validate OpenSpec
        run: openspec validate add-codegen-platform-foundation --strict

  bootstrap-family:
    name: Bootstrap Family (${{ matrix.device }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        device:
          - stm32g030f6
          - stm32g071rb
          - stm32g0b1re

    steps:
      - name: Checkout alloy-codegen
        uses: actions/checkout@v4

      - name: Checkout Alloy consumer
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/alloy
          path: alloy

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Validate machine-readable report
        run: |
          set -o pipefail
          mkdir -p out/validation
          report_path="out/validation/${{ matrix.device }}.json"
          set +e
          python -m alloy_codegen.cli validate \
            --device "${{ matrix.device }}" \
            --source-root tests/fixtures/cmsis-svd-data \
            --artifact-root "$RUNNER_TEMP/artifacts/${{ matrix.device }}" \
            --publication-root "$RUNNER_TEMP/publication/${{ matrix.device }}" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$report_path"
          validate_status=${PIPESTATUS[0]}
          set -e
          python - "$report_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          assert payload["stage"] == "validate", payload
          assert payload["scope"]["device"], payload
          report = payload["payload"]["report"]
          assert report["report_id"] == "bootstrap-validation-v1", payload
          assert report["is_passing"] is True, payload
          assert any(
              gate["gate_id"] == "gate-c" and gate["passed"] for gate in report["gates"]
          ), payload
          PY
          test "$validate_status" -eq 0

      - name: Publish bootstrap artifact
        run: |
          set -o pipefail
          mkdir -p out/publish
          publish_path="out/publish/${{ matrix.device }}.json"
          python -m alloy_codegen.cli publish \
            --device "${{ matrix.device }}" \
            --source-root tests/fixtures/cmsis-svd-data \
            --artifact-root "$RUNNER_TEMP/artifacts/${{ matrix.device }}" \
            --publication-root "$RUNNER_TEMP/publication/${{ matrix.device }}" \
            --alloy-root "$GITHUB_WORKSPACE/alloy" \
            --json | tee "$publish_path"
          python - "$publish_path" <<'PY'
          import json
          import sys
          from pathlib import Path

          payload = json.loads(Path(sys.argv[1]).read_text())
          assert payload["stage"] == "publish", payload
          assert payload["status"] == "completed", payload
          plan = payload["payload"]
          assert plan["publication_mode"] == "published", payload
          assert plan["target_artifact_revision"], payload
          assert plan["consumer_verification"]["succeeded"] is True, payload
          PY

      - name: Upload validation and publication reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-family-${{ matrix.device }}
          path: out/
