# Per-artifact byte-size budgets (artifact-footprint-budget).
#
# The publish stage compares every emitted artifact's UTF-8 byte
# size against the matching entry below.  An exceedance of `warn`
# surfaces in the publication's warnings; an exceedance of `fail`
# aborts the build unless an explicit override exists in
# `data/artifact_footprint_overrides.toml`.
#
# Values are derived from the largest currently admitted device's
# actual output (SAME70 / RP2040 / ESP32-C3 worst cases) plus 25%
# / 50% headroom so the gate is non-disruptive on day one — no
# admitted device fails today, and any new emitter regression
# that grows output beyond ~50% of the worst-case baseline trips
# the gate.
#
# Units are bytes.  Each entry matches an artifact basename
# (path-suffix).  A `default` entry catches artifacts that have
# no explicit row; pick conservative numbers there to keep
# diagnostic noise low.

[default]
# Catch-all for emitted JSON manifests that scale with device
# complexity.  Set generously so day-1 devices don't trip;
# tighten in follow-up changes after the per-class budgets are
# refined.
warn = 16777216  # 16 MiB
fail = 33554432  # 32 MiB

